---
# AthenaStack MegaLinter configuration
# This file defines what MegaLinter examines.
#
# The GitHub Actions workflow that runs MegaLinter is located at:
# .github/workflows/mega-linter.yml

APPLY_FIXES: none

# Explicitly select only the linters relevant to the current repository.
# Using ENABLE_LINTERS prevents MegaLinter from running unrelated tools.
ENABLE_LINTERS:
  - ACTION_ACTIONLINT
  - MARKDOWN_MARKDOWNLINT
  - YAML_YAMLLINT
  - PYTHON_PYLINT

# Fail immediately if the selected flavor does not contain one of the
# linters listed above.
FAIL_IF_MISSING_LINTER_IN_FLAVOR: true

# Formatting tools should report problems rather than silently changing files.
FORMATTERS_DISABLE_ERRORS: false
FAIL_IF_UPDATED_SOURCES: true

# Respect files and directories excluded by .gitignore.
IGNORE_GITIGNORED_FILES: true
IGNORE_GENERATED_FILES: true

# Produce useful, readable CI output.
LOG_LEVEL: INFO
PRINT_ALL_FILES: true
SHOW_ELAPSED_TIME: true
SHOW_SKIPPED_LINTERS: false

# Do not lint generated MegaLinter reports.
ADDITIONAL_EXCLUDED_DIRECTORIES:
  - megalinter-reports
