---
extends: default

rules:
  document-start:
    present: true

  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false

  line-length:
    max: 120
    level: warning

  comments:
    min-spaces-from-content: 1

  comments-indentation: enable

  truthy:
    allowed-values:
      - "true"
      - "false"
      - "on"
    check-keys: false

  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 0

  braces:
    min-spaces-inside: 0
    max-spaces-inside: 0
